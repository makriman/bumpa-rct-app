name: Publish release images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  verify:
    name: Verify required CI passed
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: Require a successful CI run for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          conclusion="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$GITHUB_SHA&status=completed&per_page=20" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")][0].conclusion // ""')"
          if [[ "$conclusion" != "success" ]]; then
            echo "No successful CI run exists for $GITHUB_SHA; refusing image publication" >&2
            exit 1
          fi

  publish:
    name: Publish ${{ matrix.name }} image
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Check out the selected revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute immutable image tags
        id: image
        shell: bash
        run: |
          set -Eeuo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image_name="ghcr.io/$owner/bumpabestie-${{ matrix.name }}"
          {
            echo 'tags<<EOF'
            echo "$image_name:sha-$GITHUB_SHA"
            if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
              if [[ "$GITHUB_REF_NAME" == "latest" || ! "$GITHUB_REF_NAME" =~ ^v[0-9A-Za-z._-]+$ ]]; then
                echo "Unsupported release tag: $GITHUB_REF_NAME" >&2
                exit 2
              fi
              echo "$image_name:$GITHUB_REF_NAME"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
