name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22.17.0"
  UV_VERSION: "0.11.8"

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: bumpabestie
          POSTGRES_PASSWORD: ci-postgres-only
          POSTGRES_DB: bumpabestie_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bumpabestie -d bumpabestie_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://bumpabestie:ci-postgres-only@127.0.0.1:5432/bumpabestie_test
      SYNC_DATABASE_URL: postgresql://bumpabestie:ci-postgres-only@127.0.0.1:5432/bumpabestie_test
      REDIS_URL: redis://127.0.0.1:6379/15
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
      OTP_SECRET: ci-only-otp-secret-at-least-32-characters
      FIELD_ENCRYPTION_KEY: ci-only-field-encryption-key-at-least-32-chars
      INTERNAL_SERVICE_TOKEN: ci-only-internal-token-at-least-32-chars
      COOKIE_SECRET: ci-only-cookie-secret-at-least-32-characters
      WHATSAPP_BACKEND: mock
      AGENT_BACKEND: mock
      BUMPA_BACKEND: mock
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"
      - name: Install locked dependencies
        working-directory: apps/api
        run: uv sync --all-extras --locked
      - name: Lint and format
        working-directory: apps/api
        run: |
          uv run ruff check app tests scripts/verify_postgres_rls.py
          uv run ruff format --check app tests scripts/verify_postgres_rls.py
      - name: Typecheck
        working-directory: apps/api
        run: uv run mypy app scripts/verify_postgres_rls.py
      - name: Verify checked-in OpenAPI contract
        working-directory: apps/api
        run: uv run python -m app.openapi_contract check
      - name: Migrate compatibility baseline
        working-directory: apps/api
        run: |
          uv run alembic upgrade 0005_platform_roles
          uv run python scripts/verify_postgres_rls.py --seed-sync-compat
          uv run alembic upgrade 0007_legacy_sync_writer
          uv run python scripts/verify_postgres_rls.py --seed-bumpa-raw-compat
      - name: Migrate database to head
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: Verify Bumpa raw-response migration compatibility
        working-directory: apps/api
        run: |
          uv run python scripts/verify_postgres_rls.py --verify-bumpa-raw-compat
          if uv run alembic downgrade 0007_legacy_sync_writer; then
            echo "0008 downgrade unexpectedly accepted status-less evidence" >&2
            exit 1
          fi
          uv run python scripts/verify_postgres_rls.py --remove-statusless-bumpa-raw
          uv run alembic downgrade 0007_legacy_sync_writer
          uv run python scripts/verify_postgres_rls.py --verify-bumpa-raw-downgrade
          uv run alembic upgrade head
          uv run python scripts/verify_postgres_rls.py --verify-bumpa-raw-compat
          uv run python scripts/verify_postgres_rls.py --verify-bumpa-sync-atomicity
      - name: Verify PostgreSQL tenant RLS
        working-directory: apps/api
        run: uv run python scripts/verify_postgres_rls.py
      - name: Test with branch coverage
        working-directory: apps/api
        run: uv run pytest --cov=app --cov-branch --cov-fail-under=85 --cov-report=term-missing --cov-report=xml --junitxml=junit.xml
      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-evidence
          path: |
            apps/api/coverage.xml
            apps/api/junit.xml
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: Frontend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install locked dependencies
        run: npm --prefix apps/web ci
      - name: Verify generated TypeScript API contract
        run: ./scripts/check_api_contract.sh
      - name: Lint, format and typecheck
        run: |
          npm --prefix apps/web run lint
          npm --prefix apps/web run format:check
          npm --prefix apps/web run typecheck
      - name: Unit and component tests
        run: npm --prefix apps/web run test:coverage
      - name: Desktop and mobile Playwright checks in pinned Linux runtime
        run: make e2e-linux
      - name: Upload frontend evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-evidence
          path: |
            apps/web/coverage
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: warn
          retention-days: 14

  repository:
    name: Repository and Compose contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate shell
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          ./scripts/validate_shell.sh
      - name: Test host operational controls
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'
      - name: Validate environment example
        run: ./scripts/validate_env.sh .env.example local
      - name: Validate Compose
        run: |
          docker compose --env-file .env.example config --quiet
          ./scripts/test_production_contract.sh
      - name: Assert published-port boundary
        run: |
          published="$(docker compose --env-file .env.example config --format json | jq -r '.services | to_entries[] | select(.value.ports != null) | .key')"
          test "$published" = "caddy"

  bootstrap:
    name: Clean-clone bootstrap
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"
      - name: Bootstrap exact clean checkout
        run: make bootstrap
      - name: Confirm bootstrap leaves tracked source unchanged
        run: test -z "$(git status --porcelain --untracked-files=no)"

  infrastructure:
    name: Infrastructure runtime contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build and exercise infrastructure images
        run: ./scripts/test_infra_images.sh

  resilience:
    name: Load and dependency restart drill
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run sealed authenticated pressure, disk-alert, load, and restart drill
        run: python3 tests/load_failure/run.py --report /tmp/load-failure.json
      - name: Upload resilience evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: load-failure-evidence
          path: /tmp/load-failure.json
          if-no-files-found: warn
          retention-days: 14

  images:
    name: Build linux/amd64 images
    needs: [backend, frontend, repository, bootstrap, infrastructure, resilience]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            target: ""
          - name: web
            dockerfile: apps/web/Dockerfile
            target: ""
          - name: caddy
            dockerfile: infra/caddy/Dockerfile
            target: runtime
          - name: postgres
            dockerfile: infra/postgres/Dockerfile
            target: runtime
          - name: backup
            dockerfile: infra/postgres/Dockerfile
            target: backup
          - name: hermes
            dockerfile: infra/hermes/Dockerfile
            target: runtime
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          sbom: false
          tags: bumpabestie-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan ${{ matrix.name }} image
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p image-security
          set +e
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "$PWD/image-security:/evidence" \
            --volume trivy-cache:/root/.cache/trivy \
            aquasec/trivy:0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            image --scanners vuln --ignore-unfixed \
            --severity CRITICAL,HIGH --exit-code 1 \
            --format json --output "/evidence/${{ matrix.name }}.json" \
            "bumpabestie-${{ matrix.name }}:${{ github.sha }}"
          scan_status=$?
          set -e
          findings="$(jq '[.Results[]?.Vulnerabilities[]?] | length' "image-security/${{ matrix.name }}.json")"
          echo "${{ matrix.name }} fixable critical/high findings: $findings"
          exit "$scan_status"
      - name: Upload ${{ matrix.name }} image security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-security-${{ matrix.name }}
          path: image-security/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 14

  security:
    name: Secrets and dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out complete history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Audit Python lock
        run: |
          python -m pip install --disable-pip-version-check "uv==${UV_VERSION}" pip-audit==2.9.0
          cd apps/api
          uv export --locked --no-dev --no-emit-project --output-file /tmp/api-requirements.txt
          pip-audit --requirement /tmp/api-requirements.txt
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Audit production and test web dependencies
        run: |
          npm --prefix apps/web audit --omit=dev --audit-level=high
          npm --prefix apps/web audit --audit-level=high
