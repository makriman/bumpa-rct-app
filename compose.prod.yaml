services:
  app-secrets-init:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    user: "0:0"
    entrypoint: ["/usr/local/bin/init-runtime-secrets"]
    network_mode: none
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
    volumes:
      - runtime_app_secrets:/runtime-secrets
      - ./scripts/init_runtime_secrets.sh:/usr/local/bin/init-runtime-secrets:ro
      - type: bind
        source: ${OPS_ALERT_HMAC_SECRET_FILE_HOST:-/dev/null}
        target: /run/optional-secrets/ops_alert_hmac_secret
        read_only: true
      - type: bind
        source: ${GOOGLE_OAUTH_CLIENT_SECRET_FILE_HOST:-/dev/null}
        target: /run/optional-secrets/google_oauth_client_secret
        read_only: true
      - type: bind
        source: ${META_ADS_OAUTH_CLIENT_SECRET_FILE_HOST:-/dev/null}
        target: /run/optional-secrets/meta_ads_oauth_client_secret
        read_only: true
    secrets:
      - meta_app_secret
      - meta_system_user_access_token
      - meta_webhook_verify_token
    restart: "no"

  caddy-init:
    image: ${CADDY_IMAGE:?Set immutable CADDY_IMAGE}
    build: !reset null

  caddy:
    image: ${CADDY_IMAGE:?Set immutable CADDY_IMAGE}
    build: !reset null
    environment:
      CADDY_SITE_SCHEME: https
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  web:
    image: ${WEB_IMAGE:?Set immutable WEB_IMAGE}
    build: !reset null
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DEMO_MODE: "false"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  api:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    group_add:
      - "10000"
    environment:
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      OTP_SECRET: ${OTP_SECRET:?Set OTP_SECRET}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?Set FIELD_ENCRYPTION_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set COOKIE_SECRET}
      SESSION_COOKIE_SECURE: "true"
      EXPOSE_LOCAL_OTP: "false"
      SEED_DEMO_DATA: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      ASYNC_RUNTIME_ENABLED: "true"
      META_APP_SECRET: ""
      META_APP_SECRET_FILE: /run/runtime-secrets/meta_app_secret
      META_SYSTEM_USER_ACCESS_TOKEN: ""
      META_SYSTEM_USER_ACCESS_TOKEN_FILE: /run/runtime-secrets/meta_system_user_access_token
      META_WEBHOOK_VERIFY_TOKEN: ""
      META_WEBHOOK_VERIFY_TOKEN_FILE: /run/runtime-secrets/meta_webhook_verify_token
      OPS_ALERT_HMAC_SECRET: ""
      OPS_ALERT_HMAC_SECRET_FILE: /run/runtime-secrets/ops_alert_hmac_secret
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/google_oauth_client_secret
      META_ADS_OAUTH_CLIENT_SECRET: ""
      META_ADS_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/meta_ads_oauth_client_secret
      HERMES_PROFILE_ROOT: /data/hermes/profiles
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    depends_on:
      app-secrets-init:
        condition: service_completed_successfully
      hermes-staging-init:
        condition: service_completed_successfully
    volumes:
      - runtime_app_secrets:/run/runtime-secrets:ro
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"

  worker:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    environment:
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      OTP_SECRET: ${OTP_SECRET:?Set OTP_SECRET}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?Set FIELD_ENCRYPTION_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set COOKIE_SECRET}
      EXPOSE_LOCAL_OTP: "false"
      SEED_DEMO_DATA: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      ASYNC_RUNTIME_ENABLED: "true"
      META_APP_SECRET: ""
      META_APP_SECRET_FILE: /run/runtime-secrets/meta_app_secret
      META_SYSTEM_USER_ACCESS_TOKEN: ""
      META_SYSTEM_USER_ACCESS_TOKEN_FILE: /run/runtime-secrets/meta_system_user_access_token
      META_WEBHOOK_VERIFY_TOKEN: ""
      META_WEBHOOK_VERIFY_TOKEN_FILE: /run/runtime-secrets/meta_webhook_verify_token
      OPS_ALERT_HMAC_SECRET: ""
      OPS_ALERT_HMAC_SECRET_FILE: /run/runtime-secrets/ops_alert_hmac_secret
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/google_oauth_client_secret
      META_ADS_OAUTH_CLIENT_SECRET: ""
      META_ADS_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/meta_ads_oauth_client_secret
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    depends_on:
      app-secrets-init:
        condition: service_completed_successfully
    volumes:
      - runtime_app_secrets:/run/runtime-secrets:ro
    deploy:
      resources:
        limits:
          memory: 1G

  scheduler:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    environment:
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      OTP_SECRET: ${OTP_SECRET:?Set OTP_SECRET}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?Set FIELD_ENCRYPTION_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set COOKIE_SECRET}
      EXPOSE_LOCAL_OTP: "false"
      SEED_DEMO_DATA: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      ASYNC_RUNTIME_ENABLED: "true"
      WHATSAPP_BACKEND: ${WHATSAPP_BACKEND:?Set WHATSAPP_BACKEND}
      BUMPA_BACKEND: disabled
      AGENT_BACKEND: disabled
      META_APP_SECRET: ""
      META_APP_SECRET_FILE: /run/runtime-secrets/meta_app_secret
      META_SYSTEM_USER_ACCESS_TOKEN: ""
      META_SYSTEM_USER_ACCESS_TOKEN_FILE: /run/runtime-secrets/meta_system_user_access_token
      META_WEBHOOK_VERIFY_TOKEN: ""
      META_WEBHOOK_VERIFY_TOKEN_FILE: /run/runtime-secrets/meta_webhook_verify_token
      OPS_ALERT_HMAC_SECRET: ""
      OPS_ALERT_HMAC_SECRET_FILE: /run/runtime-secrets/ops_alert_hmac_secret
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/google_oauth_client_secret
      META_ADS_OAUTH_CLIENT_SECRET: ""
      META_ADS_OAUTH_CLIENT_SECRET_FILE: /run/runtime-secrets/meta_ads_oauth_client_secret
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    depends_on:
      app-secrets-init:
        condition: service_completed_successfully
    volumes:
      - runtime_app_secrets:/run/runtime-secrets:ro
    deploy:
      resources:
        limits:
          memory: 512M

  migrate:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    environment:
      APP_ENV: production
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?Set FIELD_ENCRYPTION_KEY}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?Set MIGRATION_DATABASE_URL}
      WHATSAPP_BACKEND: disabled
      META_TEST_SENDER_VERIFICATION_MODE: disabled
      BUMPA_BACKEND: disabled
      AGENT_BACKEND: disabled

  hermes:
    image: ${HERMES_IMAGE:?Set immutable HERMES_IMAGE}
    build: !reset null
    command: ["sleep", "infinity"]
    environment:
      ANTHROPIC_API_KEY_FILE: /run/secrets/hermes_anthropic_api_key
      HERMES_DASHBOARD: "0"
      HERMES_CONTROL_PORT: ${HERMES_CONTROL_PORT:-8699}
      HERMES_PROFILE_ROOT: /opt/data/profiles
      HERMES_STAGING_ROOT: /staged/profiles
    volumes:
      - hermes_data:/opt/data
      - hermes_staging_data:/staged:ro
    secrets:
      - source: hermes_anthropic_api_key
        target: hermes_anthropic_api_key
        uid: "0"
        gid: "0"
        mode: 0400
    networks:
      - app
      - egress
    read_only: true
    tmpfs:
      - /run:rw,exec,nosuid,nodev
      - /tmp:rw,exec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/command/s6-svstat /run/service/main-hermes | grep -q '^up' && { [ ! -f /etc/s6-overlay/s6-rc.d/bumpabestie-hermes-control/type ] || { /command/s6-svstat /run/service/bumpabestie-hermes-control | grep -q '^up' && curl --fail --silent --max-time 3 http://127.0.0.1:$${HERMES_CONTROL_PORT}/health >/dev/null; }; }",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"
    restart: unless-stopped
    stop_grace_period: 60s

  hermes-import:
    image: ${HERMES_IMAGE:?Set immutable HERMES_IMAGE}
    build: !reset null
    entrypoint: ["/usr/local/bin/bumpabestie-hermes-import"]
    environment:
      HERMES_STAGING_ROOT: /staged/profiles
      HERMES_RUNTIME_ROOT: /opt/data/profiles
    volumes:
      - hermes_staging_data:/staged:ro
      - hermes_data:/opt/data
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
    restart: "no"

  hermes-staging-init:
    image: ${API_IMAGE:?Set immutable API_IMAGE}
    build: !reset null
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        if find /staged -mindepth 1 ! -type d ! -type f -print -quit | grep -q .; then
          echo "Hermes staging contains an unsafe filesystem entry" >&2
          exit 1
        fi
        chown -R 100:10000 /staged
        find /staged -type d -exec chmod 2750 {} +
        find /staged -type f -exec chmod 0640 {} +
    volumes:
      - hermes_staging_data:/staged
    network_mode: none
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
    restart: "no"

  postgres:
    image: ${POSTGRES_IMAGE:?Set immutable POSTGRES_IMAGE}
    build: !reset null
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      APP_POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:?Set APP_POSTGRES_PASSWORD}
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  backup-data-init:
    image: ${BACKUP_IMAGE:?Set immutable BACKUP_IMAGE}
    build: !reset null
    user: "0:0"
    entrypoint: ["/usr/local/bin/init-backup-volume"]
    network_mode: none
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_READ_SEARCH", "FOWNER"]
    volumes:
      - backups_data:/backups
      - ./scripts/init_backup_volume.sh:/usr/local/bin/init-backup-volume:ro
    restart: "no"
    profiles: ["tools"]

  backup:
    image: ${BACKUP_IMAGE:?Set immutable BACKUP_IMAGE}
    build: !reset null
    user: "0:0"
    entrypoint: ["/usr/local/bin/backup.sh"]
    environment:
      APPLICATION_REVISION: ${DEPLOY_REF:?Set immutable DEPLOY_REF}
      BACKUP_IMAGE_TAG: ${INFRA_IMAGE_TAG:?Set immutable INFRA_IMAGE_TAG}
      BACKUP_IMAGE_REF: ${BACKUP_IMAGE:?Set immutable BACKUP_IMAGE}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec
    cap_drop: ["ALL"]
    cap_add: ["DAC_READ_SEARCH"]
    volumes: !override
      - backups_data:/backups
      - exports_data:/source/exports:ro
      - hermes_data:/source/hermes-runtime:ro
      - hermes_staging_data:/source/hermes-staging:ro
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  restore:
    image: ${BACKUP_IMAGE:?Set immutable BACKUP_IMAGE}
    build: !reset null
    user: "0:0"
    entrypoint: ["/usr/local/bin/restore.sh"]
    environment:
      APPLICATION_REVISION: ${DEPLOY_REF:?Set immutable DEPLOY_REF}
      BACKUP_IMAGE_TAG: ${INFRA_IMAGE_TAG:?Set immutable INFRA_IMAGE_TAG}
      BACKUP_IMAGE_REF: ${BACKUP_IMAGE:?Set immutable BACKUP_IMAGE}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
    volumes: !override
      - backups_data:/backups:ro
      - exports_data:/source/exports
      - hermes_data:/source/hermes-runtime
      - hermes_staging_data:/source/hermes-staging
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

secrets:
  meta_app_secret:
    file: ${SECRETS_DIR:-./.secrets}/meta_app_secret
  meta_system_user_access_token:
    file: ${SECRETS_DIR:-./.secrets}/meta_system_user_access_token
  meta_webhook_verify_token:
    file: ${SECRETS_DIR:-./.secrets}/meta_webhook_verify_token
  hermes_anthropic_api_key:
    file: ${SECRETS_DIR:-./.secrets}/hermes_anthropic_api_key

volumes:
  runtime_app_secrets:
