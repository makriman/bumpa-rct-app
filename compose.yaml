  META_ADS_OAUTH_CLIENT_SECRET_FILE: ${META_ADS_OAUTH_CLIENT_SECRET_FILE:-}
  HERMES_BASE_INTERNAL_HOST: ${HERMES_BASE_INTERNAL_HOST:-http://hermes}
